name: CI

on:
  pull_request:
    branches: [main, devnet3, devnet4]
  push:
    branches: [main, devnet3, devnet4]

permissions:
  contents: read

jobs:
  format:
    name: format-check
    runs-on: ubuntu-latest
    env:
      CI: true
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      DOTNET_NOLOGO: "1"
      NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Packages.props', 'global.json', 'NuGet.config', 'scripts/libp2p/build-patched-pubsub-package.sh', 'scripts/libp2p/patches/pubsub-anonymous.patch') }}
          restore-keys: nuget-${{ runner.os }}-
      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: native/lean-crypto-ffi
      - name: Build patched pubsub package
        run: ./scripts/libp2p/build-patched-pubsub-package.sh --force
      - name: Install dotnet-format
        run: dotnet tool install --tool-path ./.dotnet-tools dotnet-format
      - name: Format check
        run: ./.dotnet-tools/dotnet-format Lean.sln --check --fix-whitespace --exclude vendor

  build-test:
    name: build-test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
          - os: macos-latest
            rid: osx-arm64
    env:
      CI: true
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      DOTNET_NOLOGO: "1"
      NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Packages.props', 'global.json', 'NuGet.config', 'scripts/libp2p/build-patched-pubsub-package.sh', 'scripts/libp2p/patches/pubsub-anonymous.patch') }}
          restore-keys: nuget-${{ runner.os }}-
      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: native/lean-crypto-ffi
      - name: Build patched pubsub package
        run: ./scripts/libp2p/build-patched-pubsub-package.sh --force
      - name: Build patched quic package
        run: ./scripts/libp2p/build-patched-quic-package.sh --force
      - name: Test
        run: |
          mkdir -p artifacts/testlogs
          set -o pipefail
          dotnet test Lean.sln -c Release --filter "FullyQualifiedName!~Integration" \
            -v normal \
            --logger "console;verbosity=detailed" \
            --logger "trx;LogFileName=build-test-${{ matrix.os }}.trx" \
            2>&1 | tee artifacts/testlogs/build-test-${{ matrix.os }}.log
      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testlogs-build-test-${{ matrix.os }}
          path: artifacts/testlogs
      - name: Publish
        run: dotnet publish src/Lean.Client/Lean.Client.csproj -c Release -r ${{ matrix.rid }} --self-contained false -o ${{ github.workspace }}/artifacts/lean-client-${{ matrix.rid }} /p:ContinuousIntegrationBuild=true
      - name: Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: lean-client-${{ matrix.rid }}
          path: artifacts/lean-client-${{ matrix.rid }}

  consensus-simulation:
    name: consensus-simulation
    runs-on: ubuntu-latest
    env:
      CI: true
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      DOTNET_NOLOGO: "1"
      NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Packages.props', 'global.json', 'NuGet.config', 'scripts/libp2p/build-patched-pubsub-package.sh', 'scripts/libp2p/patches/pubsub-anonymous.patch') }}
          restore-keys: nuget-${{ runner.os }}-
      - name: Build patched pubsub package
        run: ./scripts/libp2p/build-patched-pubsub-package.sh --force
      - name: Build patched quic package
        run: ./scripts/libp2p/build-patched-quic-package.sh --force
      - name: Run consensus simulation tests
        run: |
          mkdir -p artifacts/testlogs
          set -o pipefail
          dotnet test tests/Lean.Consensus.Tests/Lean.Consensus.Tests.csproj \
            -c Release \
            --filter "FullyQualifiedName~ConsensusMultiNodeFinalizationV2Tests" \
            /m:1 \
            /nodeReuse:false \
            -v normal \
            --logger "console;verbosity=detailed" \
            --logger "trx;LogFileName=consensus-simulation.trx" \
            2>&1 | tee artifacts/testlogs/consensus-simulation.log
      - name: Upload consensus simulation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testlogs-consensus-simulation
          path: artifacts/testlogs

  spec-tests:
    name: spec-tests
    runs-on: ubuntu-latest
    env:
      CI: true
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      DOTNET_NOLOGO: "1"
      NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages
    steps:
      - name: Checkout nlean
        uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: Checkout leanSpec
        uses: actions/checkout@v5
        with:
          repository: leanEthereum/leanSpec
          path: leanSpec
      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Packages.props', 'global.json', 'NuGet.config', 'scripts/libp2p/build-patched-pubsub-package.sh', 'scripts/libp2p/patches/pubsub-anonymous.patch') }}
          restore-keys: nuget-${{ runner.os }}-
      - name: Build patched pubsub package
        run: ./scripts/libp2p/build-patched-pubsub-package.sh --force
      - name: Generate leanSpec fixtures
        working-directory: leanSpec
        run: |
          uv sync
          uv run fill --fork=Devnet --clean -n auto
      - name: Run spec tests
        env:
          LEAN_SPECTEST_FIXTURES: ${{ github.workspace }}/leanSpec/fixtures/consensus
        run: |
          mkdir -p artifacts/testlogs
          set -o pipefail
          dotnet test tests/Lean.SpecTests/Lean.SpecTests.csproj \
            -c Release \
            --filter "Category=SpecTest" \
            -v normal \
            --logger "console;verbosity=detailed" \
            --logger "trx;LogFileName=spec-tests.trx" \
            2>&1 | tee artifacts/testlogs/spec-tests.log
      - name: Upload spec test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testlogs-spec-tests
          path: artifacts/testlogs

  integration-tests:
    name: integration-tests
    runs-on: ubuntu-latest
    timeout-minutes: 120
    # Advisory job: reports results but does not fail the workflow if it times out.
    # GitHub Actions 4-core runners are underpowered for this suite with
    # leanMultisig 2eb4b9d — see docs/plans/ for the investigation notes.
    continue-on-error: true
    env:
      CI: true
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      DOTNET_NOLOGO: "1"
      NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages
      NLEAN_INTEG_SECONDS_PER_SLOT: "4"
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
      - name: Install libmsquic
        run: |
          wget -q https://packages.microsoft.com/config/ubuntu/$(lsb_release -rs)/packages-microsoft-prod.deb -O packages-microsoft-prod.deb
          sudo dpkg -i packages-microsoft-prod.deb
          rm packages-microsoft-prod.deb
          sudo apt-get update
          sudo apt-get install -y libmsquic
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Packages.props', 'global.json', 'NuGet.config', 'scripts/libp2p/build-patched-pubsub-package.sh', 'scripts/libp2p/patches/pubsub-anonymous.patch') }}
          restore-keys: nuget-${{ runner.os }}-
      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: native/lean-crypto-ffi
      - name: Cache integration test keys
        uses: actions/cache@v4
        with:
          path: ~/.cache/nlean-integ-keys
          key: integ-keys-${{ runner.os }}-v1
          restore-keys: integ-keys-${{ runner.os }}-
      - name: Build patched pubsub package
        run: ./scripts/libp2p/build-patched-pubsub-package.sh --force
      - name: Build patched quic package
        run: ./scripts/libp2p/build-patched-quic-package.sh --force
      - name: Publish binary
        run: dotnet publish src/Lean.Client/Lean.Client.csproj -c Release -o artifacts/lean-client --self-contained false
      - name: Run integration tests
        run: |
          mkdir -p artifacts/testlogs
          set -o pipefail
          dotnet test tests/Lean.Integration.Tests/Lean.Integration.Tests.csproj \
            -c Release \
            -v normal \
            --logger "console;verbosity=detailed" \
            --logger "trx;LogFileName=integration-tests.trx" \
            2>&1 | tee artifacts/testlogs/integration-tests.log
      - name: Upload integration test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testlogs-integration-tests
          path: artifacts/testlogs
